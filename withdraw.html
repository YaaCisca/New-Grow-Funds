<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Withdraw - GrowFunds</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 20px; text-align: center; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .submit-btn { background: #1b5e20; color: white; padding: 15px; width: 100%; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        #calc-box { background: #e8f5e9; padding: 10px; border-radius: 8px; margin: 15px 0; display: none; }
        .back-link { display: block; margin-top: 20px; color: #666; text-decoration: none; }
    </style>
</head>
<body>

<div class="card">
    <h2>Withdraw Funds</h2>
    <p>Minimum: GHS 50.00</p>
    
    <input type="number" id="amount" placeholder="Amount (GHS)" oninput="calculateNet()">
    
    <div id="calc-box">
        <p>Service Fee (2%): GHS <span id="fee">0.00</span></p>
        <p><strong>Net Payout: GHS <span id="net">0.00</span></strong></p>
    </div>

    <select id="network" onchange="updatePlaceholder()">
        <option value="MTN">MTN Mobile Money</option>
        <option value="Telecel">Telecel Cash</option>
        <option value="AT">AT Money</option>
    </select>

    <input type="text" id="momo" placeholder="Enter MTN Number">

    <button class="submit-btn" onclick="requestWithdrawal()">Request Withdrawal</button>
    <a href="dashboard.html" class="back-link">Back to Dashboard</a>
</div>

<script>
  // Firebase Configuration
  const firebaseConfig = {
    apiKey: "AIzaSyATHzKZbEV-G8geYqawjooNvBXO7w39bFc",
    authDomain: "grow-funds-ee038.firebaseapp.com",
    databaseURL: "https://grow-funds-ee038-default-rtdb.firebaseio.com",
    projectId: "grow-funds-ee038",
    storageBucket: "grow-funds-ee038.firebasestorage.app",
    messagingSenderId: "823406942973",
    appId: "1:823406942973:web:362e219ad44856efa17c94",
    measurementId: "G-GLTF1DPZKM"
  };

  // Initialize Firebase
  if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
  const db = firebase.firestore();
  const auth = firebase.auth();

  // Updates the input placeholder based on selected network
  function updatePlaceholder() {
      const network = document.getElementById('network').value;
      document.getElementById('momo').placeholder = "Enter " + network + " Number";
  }

  // Calculates the 2% fee and final payout
  function calculateNet() {
      const amount = parseFloat(document.getElementById('amount').value);
      const box = document.getElementById('calc-box');
      if (amount >= 50) {
          box.style.display = "block";
          const fee = amount * 0.02;
          const net = amount - fee;
          document.getElementById('fee').innerText = fee.toFixed(2);
          document.getElementById('net').innerText = net.toFixed(2);
      } else {
          box.style.display = "none";
      }
  }

  // Submits the request to the database
  async function requestWithdrawal() {
      const amount = parseFloat(document.getElementById('amount').value);
      const phone = document.getElementById('momo').value;
      const netType = document.getElementById('network').value;
      const user = auth.currentUser;

      if (!user) return alert("Please log in first");
      if (isNaN(amount) || amount < 50) return alert("Minimum withdrawal is GHS 50.00");
      if (phone.length < 10) return alert("Please enter a valid phone number");

      try {
          const userDoc = await db.collection("users").doc(user.uid).get();
          const currentBalance = userDoc.data().balance;

          if (currentBalance < amount) {
              return alert("Insufficient balance! Your current balance is GHS " + currentBalance.toFixed(2));
          }

          // 1. Add to the withdrawals collection for admin review
          await db.collection("withdrawals").add({
              email: user.email,
              userId: user.uid,
              amount: amount,
              fee: amount * 0.02,
              netPayout: amount * 0.98,
              phone: phone,
              network: netType,
              status: "Pending",
              timestamp: firebase.firestore.FieldValue.serverTimestamp()
          });

          // 2. Deduct the amount from the user's wallet
          await db.collection("users").doc(user.uid).update({
              balance: currentBalance - amount
          });

          alert("Withdrawal request sent! Your balance has been updated.");
          window.location.href = "dashboard.html";
      } catch (e) {
          alert("Error: " + e.message);
      }
  }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grow Funds - My Profile</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .profile-info-section {
            background: white;
            margin: 15px;
            border-radius: 10px;
            padding: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 5px;
            border-bottom: 1px solid #eee;
        }
        .info-row:last-child { border-bottom: none; }
        .label { color: #666; font-weight: 500; }
        .value { color: #333; font-weight: bold; }
        .status-active { color: #28a745; }
    </style>
</head>
<body>

    <div class="header" style="background: #28a745; color: white; padding: 20px; text-align: center;">
        <h2>User Profile</h2>
    </div>

    <div class="profile-info-section">
        <div class="info-row">
            <span class="label">Name:</span>
            <span class="value" id="disp-name">Loading...</span>
        </div>
        <div class="info-row">
            <span class="label">Phone Number:</span>
            <span class="value" id="disp-phone">Loading...</span>
        </div>
        <div class="info-row">
            <span class="label">Email:</span>
            <span class="value" id="disp-email">Loading...</span>
        </div>
        <div class="info-row">
            <span class="label">Current Status:</span>
            <span class="value status-active" id="disp-status">Active</span>
        </div>
    </div>

    <div class="profile-info-section">
        <div class="info-row">
            <span class="label">Total Balance:</span>
            <span class="value" id="disp-balance">0.00 GH₵</span>
        </div>
    </div>

    <button class="logout-btn" style="width: 90%; margin: 20px 5%; padding: 12px; background: #ff4444; color: white; border: none; border-radius: 5px;" onclick="logout()">
        Logout
    </button>

    <script src="profile.js"></script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Grow Funds</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
</head>
<body>
    <div class="header"><h2>My Profile</h2></div>
    <div class="card">
        <p>Name: <span id="pName">...</span></p>
        <p>Email: <span id="pEmail">...</span></p>
        <button onclick="firebase.auth().signOut().then(()=>window.location.href='registration.html')" style="color:red; background:none; border:1px solid red; padding:10px; width:100%; border-radius:5px;">Logout</button>
    </div>
    <nav class="bottom-nav">
        <a href="index.html" class="nav-link">Home</a>
        <a href="task.html" class="nav-link">Task</a>
        <a href="team.html" class="nav-link">Team</a>
        <a href="profile.html" class="nav-link active">Profile</a>
    </nav>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyATHzKZbEV-G8geYqawjooNvBXO7w39bFc", authDomain: "grow-funds-ee038.firebaseapp.com", projectId: "grow-funds-ee038", storageBucket: "grow-funds-ee038.appspot.com", messagingSenderId: "567087541628", appId: "1:567087541628:web:78a3f8c8d8f8a8f8" };
        firebase.initializeApp(firebaseConfig);
        firebase.auth().onAuthStateChanged(user => {
            if(user) {
                firebase.firestore().collection("users").doc(user.uid).get().then(doc => {
                    document.getElementById('pName').innerText = doc.data().name;
                    document.getElementById('pEmail').innerText = doc.data().email;
                });
            }
        });
    </script>
</body>
</html>

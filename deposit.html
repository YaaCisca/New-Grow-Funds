<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deposit - Grow Funds</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://js.paystack.co/v1/inline.js"></script>
</head>
<body>
    <div class="header">
        <button onclick="history.back()" style="position:absolute; left:20px; top:40px; background:none; border:none; color:white; font-size:20px;">←</button>
        <h2>Recharge Wallet</h2>
    </div>

    <div class="card" style="text-align:center; padding:40px 20px;">
        <p style="color:var(--text-dim);">Enter amount to deposit via MoMo</p>
        <input type="number" id="amt" placeholder="0.00" style="width:100%; background:transparent; border:none; border-bottom:2px solid #28a745; color:white; font-size:35px; text-align:center; outline:none; margin-bottom:30px;">
        <button class="btn-main" onclick="pay()">Proceed to Pay</button>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyATHzKZbEV-G8geYqawjooNvBXO7w39bFc", authDomain: "grow-funds-ee038.firebaseapp.com", projectId: "grow-funds-ee038", storageBucket: "grow-funds-ee038.appspot.com", messagingSenderId: "567087541628", appId: "1:567087541628:web:78a3f8c8d8f8a8f8" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);

        function pay() {
            const amount = document.getElementById('amt').value;
            const user = firebase.auth().currentUser;
            if(!amount || amount < 10) return alert("Min deposit 10 GHS");

            let handler = PaystackPop.setup({
                key: 'pk_live_79015a309ab4053f32bbab37da48cf170bad29cd',
                email: user.email,
                amount: amount * 100,
                currency: 'GHS',
                callback: function(res) {
                    firebase.firestore().collection("users").doc(user.uid).update({
                        balance: firebase.firestore.FieldValue.increment(parseFloat(amount))
                    }).then(() => { alert("Success!"); window.location.href="index.html"; });
                }
            });
            handler.openIframe();
        }
    </script>
</body>
</html>

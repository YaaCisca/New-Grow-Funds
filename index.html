<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GrowFunds | Login & Register</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .auth-card { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 350px; text-align: center; }
        h2 { color: #1b5e20; margin-bottom: 25px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { background: #2e7d32; color: white; padding: 12px; width: 100%; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .toggle-link { margin-top: 20px; color: #2e7d32; cursor: pointer; display: block; font-size: 14px; text-decoration: none; }
    </style>
</head>
<body>

<div class="auth-card">
    <h2 id="title">Welcome to GrowFunds</h2>
    <input type="email" id="email" placeholder="Email Address">
    <input type="password" id="password" placeholder="Password">
    
    <button id="auth-btn" onclick="handleAuth()">Login</button>
    
    <span class="toggle-link" id="toggle-msg" onclick="toggleMode()">New here? Register</span>
</div>

<script>
  // 1. Configuration
  const firebaseConfig = {
    apiKey: "AIzaSyATHzKZbEV-G8geYqawjooNvBXO7w39bFc",
    authDomain: "grow-funds-ee038.firebaseapp.com",
    databaseURL: "https://grow-funds-ee038-default-rtdb.firebaseio.com",
    projectId: "grow-funds-ee038",
    storageBucket: "grow-funds-ee038.firebasestorage.app",
    messagingSenderId: "823406942973",
    appId: "1:823406942973:web:362e219ad44856efa17c94",
    measurementId: "G-GLTF1DPZKM"
  };

  // 2. Immediate Initialization
  if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
  }
  const auth = firebase.auth();
  const db = firebase.firestore();

  let isLoginMode = true;

  function toggleMode() {
      isLoginMode = !isLoginMode;
      document.getElementById('title').innerText = isLoginMode ? "Welcome to GrowFunds" : "Create Account";
      document.getElementById('auth-btn').innerText = isLoginMode ? "Login" : "Register";
      document.getElementById('toggle-msg').innerText = isLoginMode ? "New here? Register" : "Have an account? Login";
  }

  async function handleAuth() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      if (!email || !password) {
          alert("Please fill in all fields");
          return;
      }

      try {
          if (isLoginMode) {
              // Login Logic
              await auth.signInWithEmailAndPassword(email, password);
              window.location.href = "dashboard.html";
          } else {
              // Registration Logic
              const cred = await auth.createUserWithEmailAndPassword(email, password);
              
              // Create user record with 10 GHS bonus
              await db.collection("users").doc(cred.user.uid).set({
                  email: email,
                  balance: 10.00,
                  joinedDate: new Date().toISOString()
              });

              alert("Registration Successful! GHS 10.00 bonus added.");
              window.location.href = "dashboard.html";
          }
      } catch (error) {
          console.error(error);
          alert(error.message);
      }
  }
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grow Funds - Home</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
</head>
<body>
    <div class="header">
        <h2 id="uName" style="margin:0; font-size: 1.5rem;">Hello, Investor</h2>
        <p style="opacity: 0.9;">Total Assets</p>
        <h1 style="margin: 10px 0;"><span id="uBal">0.00</span> <small style="font-size: 15px;">GHS</small></h1>
        <button onclick="window.location.href='deposit.html'" style="background:white; color:#1e7e34; border:none; padding:10px 25px; border-radius:50px; font-weight:bold; box-shadow: 0 4px 15px rgba(0,0,0,0.2);">+ Recharge</button>
    </div>

    <div class="card" style="display:flex; justify-content:space-around; margin-top:-25px; background: rgba(30, 30, 30, 0.8);">
        <div style="text-align:center"><p style="color:var(--text-dim); margin:0;">Daily Profit</p><h3 style="color:#28a745; margin:5px 0;">+ 0.00</h3></div>
        <div style="text-align:center"><p style="color:var(--text-dim); margin:0;">Total Rev</p><h3 style="margin:5px 0;">0.00</h3></div>
    </div>

    <h3 style="padding-left: 20px; margin-top: 30px;">Investment Tiers</h3>
    
    <div class="card" style="display:flex; justify-content:space-between; align-items:center; border-left: 5px solid #28a745;">
        <div>
            <h4 style="margin:0;">VIP 1 - Starter</h4>
            <p style="color:var(--text-dim); font-size:12px; margin:5px 0;">Price: 50 GH₵ | Daily: 2.50 GH₵</p>
        </div>
        <button onclick="invest(50)" style="background:var(--primary-gradient); border:none; color:white; padding:10px 15px; border-radius:10px; font-weight:600;">Invest</button>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-link active">Home</a>
        <a href="task.html" class="nav-link">Task</a>
        <a href="team.html" class="nav-link">Team</a>
        <a href="profile.html" class="nav-link">Profile</a>
    </nav>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyATHzKZbEV-G8geYqawjooNvBXO7w39bFc", authDomain: "grow-funds-ee038.firebaseapp.com", projectId: "grow-funds-ee038", storageBucket: "grow-funds-ee038.appspot.com", messagingSenderId: "567087541628", appId: "1:567087541628:web:78a3f8c8d8f8a8f8" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        
        firebase.auth().onAuthStateChanged(user => {
            if(user) {
                firebase.firestore().collection("users").doc(user.uid).onSnapshot(doc => {
                    if(doc.exists) {
                        document.getElementById('uName').innerText = "Hi, " + doc.data().name.split(' ')[0];
                        document.getElementById('uBal').innerText = doc.data().balance.toFixed(2);
                    }
                });
            } else { window.location.href="registration.html"; }
        });

        function invest(amt) {
            const user = firebase.auth().currentUser;
            const ref = firebase.firestore().collection("users").doc(user.uid);
            ref.get().then(doc => {
                if(doc.data().balance >= amt) {
                    ref.update({ balance: firebase.firestore.FieldValue.increment(-amt) });
                    alert("Plan Activated!");
                } else { alert("Balance too low!"); window.location.href="deposit.html"; }
            });
        }
    </script>
</body>
</html>

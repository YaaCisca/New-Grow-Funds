<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grow Funds - Home</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; padding-bottom: 80px; }
        .header { background: #004d00; padding: 30px 20px; text-align: center; border-radius: 0 0 20px 20px; }
        .balance-card { background: #1a1a1a; margin: -20px 15px 15px 15px; padding: 20px; border-radius: 15px; display: flex; justify-content: space-around; border: 1px solid #333; }
        .tier-card { background: #1a1a1a; margin: 15px; border-radius: 12px; border: 1px solid #333; overflow: hidden; }
        .tier-body { padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .invest-btn { background: #28a745; color: white; border: none; padding: 10px 20px; border-radius: 5px; font-weight: bold; }
        
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #111; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #222; }
        .nav-link { color: #888; text-decoration: none; font-size: 14px; }
        .active { color: #28a745; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <h2 id="welcomeName">Welcome, Investor</h2>
        <p>Current Balance: <span id="topBalance">10.00</span> GH₵</p>
    </div>

    <div class="balance-card">
        <div style="text-align:center">
            <span style="color:#888; font-size:12px">Total Balance</span>
            <h3 id="cardBalance">10.00 GH₵</h3>
        </div>
        <div style="text-align:center">
            <span style="color:#888; font-size:12px">Daily Profit</span>
            <h3>0.00 GH₵</h3>
        </div>
    </div>

    <div class="tier-card">
        <div class="tier-body">
            <div>
                <h4 style="margin:0; color:#28a745">VIP 1 (Starter)</h4>
                <p style="font-size:12px; color:#888">Price: 50 GH₵ | Daily: 2.50 GH₵</p>
            </div>
            <button class="invest-btn" onclick="alert('Insufficient Balance!')">Invest</button>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-link active">Home</a>
        <a href="task.html" class="nav-link">Task</a>
        <a href="team.html" class="nav-link">Team</a>
        <a href="profile.html" class="nav-link">Profile</a>
    </nav>

    <script>
        window.onload = function() {
            const name = localStorage.getItem('userName') || "Investor";
            const balance = localStorage.getItem('userBalance') || "10.00";
            document.getElementById('welcomeName').innerText = "Welcome, " + name;
            document.getElementById('topBalance').innerText = balance;
            document.getElementById('cardBalance').innerText = balance + " GH₵";
        }
    </script>
</body>
</html>

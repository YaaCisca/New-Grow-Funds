<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transaction History - GrowFunds</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 20px; margin: 0; }
        .header { display: flex; align-items: center; margin-bottom: 20px; }
        .back-btn { text-decoration: none; font-size: 20px; color: #1b5e20; margin-right: 15px; }
        h2 { color: #333; margin: 0; }
        
        .transaction-card {
            background: white;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .details span { display: block; }
        .type { font-weight: bold; color: #333; }
        .date { font-size: 12px; color: #888; }
        .amount { font-weight: bold; font-size: 16px; }
        .credit { color: #1b5e20; } /* Green for money in */
        .debit { color: #d32f2f; }  /* Red for money out */
    </style>
</head>
<body>

    <div class="header">
        <a href="dashboard.html" class="back-btn">⬅</a>
        <h2>History</h2>
    </div>

    <div id="historyList">
        <p style="color: #888;">Loading your transactions...</p>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyATHzKZbEV-G8geYqawjooNvBXO7w39bFc",
            authDomain: "grow-funds-ee038.firebaseapp.com",
            projectId: "grow-funds-ee038",
            storageBucket: "grow-funds-ee038.firebasestorage.app",
            messagingSenderId: "823406942973",
            appId: "1:823406942973:web:362e219ad44856efa17c94"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        firebase.auth().onAuthStateChanged(user => {
            if (user) {
                db.collection("transactions")
                  .where("userId", "==", user.uid)
                  .orderBy("timestamp", "desc")
                  .onSnapshot(snapshot => {
                      const list = document.getElementById('historyList');
                      list.innerHTML = ""; // Clear loader

                      if (snapshot.empty) {
                          list.innerHTML = "<p>No transactions yet.</p>";
                          return;
                      }

                      snapshot.forEach(doc => {
                          const data = doc.data();
                          const isCredit = data.type === 'Deposit' || data.type === 'Bonus';
                          
                          list.innerHTML += `
                              <div class="transaction-card">
                                  <div class="details">
                                      <span class="type">${data.type}</span>
                                      <span class="date">${data.date || 'Today'}</span>
                                  </div>
                                  <div class="amount ${isCredit ? 'credit' : 'debit'}">
                                      ${isCredit ? '+' : '-'} GH₵ ${data.amount.toFixed(2)}
                                  </div>
                              </div>
                          `;
                      });
                  });
            } else {
                window.location.href = "index.html";
            }
        });
    </script>
</body>
</html>

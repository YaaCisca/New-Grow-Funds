<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GrowFunds Dashboard</title>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f4f7f6;
            margin: 0;
            padding: 20px;
            text-align: center;
        }

        .box {
            background: #1b5e20;
            color: white;
            padding: 40px;
            border-radius: 20px;
            margin-bottom: 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            max-width: 420px;
            margin: auto;
        }

        .btn {
            background: white;
            padding: 18px;
            border-radius: 12px;
            text-decoration: none;
            color: #333;
            font-weight: bold;
            border: 1px solid #ddd;
            transition: 0.3s;
        }

        .btn:hover {
            background: #e8f5e9;
        }

        .logout {
            margin-top: 30px;
            color: red;
            cursor: pointer;
            font-weight: bold;
            display: inline-block;
        }
    </style>
</head>
<body>

    <div class="box">
        <p>Wallet Balance</p>
        <h1>GHS <span id="balance">0.00</span></h1>
    </div>

    <div class="grid">
        <!-- ✅ FIXED -->
        <a href="deposit.html" class="btn">➕ Deposit</a>

        <!-- Investment plans -->
        <a href="plans.html" class="btn">📈 Invest</a>

        <a href="withdraw.html" class="btn">💸 Withdraw</a>
        <a href="profile.html" class="btn">👤 Profile</a>
        <a href="history.html" class="btn">📜 History</a>
    </div>

    <div class="logout" onclick="logout()">Log Out</div>

    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyATHzKZbEV-G8geYqawjooNvBXO7w39bFc",
            authDomain: "grow-funds-ee038.firebaseapp.com",
            projectId: "grow-funds-ee038",
            storageBucket: "grow-funds-ee038.firebasestorage.app",
            messagingSenderId: "823406942973",
            appId: "1:823406942973:web:362e219ad44856efa17c94"
        };

        // Initialize Firebase
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }

        const auth = firebase.auth();
        const db = firebase.firestore();

        // Load user + balance
        auth.onAuthStateChanged(user => {
            if (user) {
                db.collection("users").doc(user.uid)
                .onSnapshot(doc => {
                    if (doc.exists) {
                        const data = doc.data();
                        document.getElementById("balance").innerText =
                            (data.balance || 0).toFixed(2);
                    }
                });
            } else {
                // Not logged in → redirect
                window.location.href = "index.html";
            }
        });

        // Logout
        function logout() {
            auth.signOut().then(() => {
                window.location.href = "index.html";
            });
        }
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #f4f7f6; }
        .box { background: #1b5e20; color: white; padding: 40px; border-radius: 20px; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { background: white; padding: 20px; border-radius: 10px; text-decoration: none; color: #333; font-weight: bold; border: 1px solid #ddd; }
        .logout { margin-top: 30px; color: red; cursor: pointer; display: block; }
    </style>
</head>
<body>
    <div class="box">
        <p>Wallet Balance</p>
        <h1>GHS <span id="bal">0.00</span></h1>
    </div>
    <div class="grid">
        <a href="plans.html" class="btn">➕ Deposit</a>
        <a href="withdraw.html" class="btn">💸 Withdraw</a>
        <a href="profile.html" class="btn">👤 Profile</a>
        <a href="history.html" class="btn">📜 History</a>
    </div>
    <span class="logout" onclick="firebase.auth().signOut().then(()=>window.location.href='index.html')">Log Out</span>

    <script>
        // 2. PASTE YOUR CONFIG HERE
        const firebaseConfig = {
          apiKey: "AIzaSyATHzKZbEV-G8geYqawjooNvBXO7w39bFc",
          authDomain: "grow-funds-ee038.firebaseapp.com",
          databaseURL: "https://grow-funds-ee038-default-rtdb.firebaseio.com",
          projectId: "grow-funds-ee038",
          storageBucket: "grow-funds-ee038.firebasestorage.app",
          messagingSenderId: "823406942973",
          appId: "1:823406942973:web:362e219ad44856efa17c94",
          measurementId: "G-GLTF1DPZKM"
        };

        // Initialize Firebase
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }

        firebase.auth().onAuthStateChanged(user => {
            if (user) {
                // This connects to your database to show the live balance
                firebase.firestore().collection("users").doc(user.uid).onSnapshot(doc => {
                    if (doc.exists) {
                        document.getElementById('bal').innerText = doc.data().balance.toFixed(2);
                    }
                });
            } else { 
                window.location.href = "index.html"; 
            }
        });
    </script>
</body>
</html>

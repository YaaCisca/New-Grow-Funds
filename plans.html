<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GrowFunds | Investment Plans</title>
    <script src="https://js.paystack.co/v1/inline.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; padding: 20px; text-align: center; }
        .plans-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-top: 30px; }
        .plan-card { background: white; border-radius: 15px; padding: 25px; width: 280px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-top: 5px solid #388e3c; }
        .plan-card h3 { color: #1b5e20; margin-bottom: 10px; }
        .price { font-size: 24px; font-weight: bold; margin: 15px 0; color: #333; }
        .roi { color: #666; font-size: 14px; margin-bottom: 20px; }
        .buy-btn { background: #388e3c; color: white; padding: 12px 30px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; width: 100%; }
        .buy-btn:hover { background: #2e7d32; transform: translateY(-2px); }
    </style>
</head>
<body>

    <h2>Select Your Investment Plan</h2>
    <p>All plans include a GHS 10.00 welcome bonus for new members.</p>

    <div class="plans-container">
        <div class="plan-card">
            <h3>Bronze Plan</h3>
            <div class="price">GHS 50.00</div>
            <p class="roi">Daily Return: GHS 2.50<br>Weekly: GHS 17.50</p>
            <button class="buy-btn" onclick="payWithPaystack(50, 'Bronze')">Invest Now</button>
        </div>

        <div class="plan-card" style="border-top-color: #1976d2;">
            <h3 style="color: #0d47a1;">Silver Plan</h3>
            <div class="price">GHS 150.00</div>
            <p class="roi">Daily Return: GHS 8.00<br>Weekly: GHS 56.00</p>
            <button class="buy-btn" style="background: #1976d2;" onclick="payWithPaystack(150, 'Silver')">Invest Now</button>
        </div>

        <div class="plan-card" style="border-top-color: #fbc02d;">
            <h3 style="color: #f57f17;">Gold Plan</h3>
            <div class="price">GHS 500.00</div>
            <p class="roi">Daily Return: GHS 30.00<br>Weekly: GHS 210.00</p>
            <button class="buy-btn" style="background: #fbc02d; color: #333;" onclick="payWithPaystack(500, 'Gold')">Invest Now</button>
        </div>
    </div>

    <script>
        function payWithPaystack(amountGHS, planName) {
            let handler = PaystackPop.setup({
                key: 'pk_live_79015a309ab4053f32bbab37da48cf170bad29cd',
                email: 'student@uenr.edu.gh', // This will pull from your Firebase login later
                amount: amountGHS * 100, // Amount in pesewas
                currency: 'GHS',
                metadata: {
                    custom_fields: [
                        { display_name: "Plan Type", variable_name: "plan_type", value: planName }
                    ]
                },
                callback: function(response) {
                    alert('Success! You are now invested in the ' + planName + ' plan. Reference: ' + response.reference);
                    // Add code here to update Firebase balance + planName
                },
                onClose: function() {
                    alert('Transaction cancelled. Your earnings will not start until payment is made.');
                }
            });
            handler.openIframe();
        }
    </script>
</body>
</html>
